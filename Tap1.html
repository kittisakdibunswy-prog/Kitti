<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KITTISAK Portfolio</title>

<style>

/* รีเซ็ตพื้นฐาน */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI, sans-serif;
}

body{
background:#050505;
height:200vh;
color:white;
}

/* NAVBAR */

.navbar{

position:fixed;
top:25px;
left:50%;
transform:translateX(-50%);

width:60%;

display:flex;
justify-content:space-between;
align-items:center;

padding:14px 35px;

background:rgba(10,10,10,0.55);
backdrop-filter:blur(12px);
-webkit-backdrop-filter:blur(12px);

border-radius:14px;

border:1px solid rgba(255,0,0,0.2);

box-shadow:
0 10px 40px rgba(0,0,0,.9),
0 0 20px rgba(120,0,0,.2);

}

/* โลโก้ */

.logo{

font-size:16px;
font-weight:600;
letter-spacing:2px;
color:#ffffff;

}

/* เมนู */

.menu{

display:flex;
gap:40px;
list-style:none;

}

.menu a{

text-decoration:none;
color:#9a9a9a;
font-size:14px;
position:relative;
transition:.3s;

}

.menu a:hover{

color:#ff2b2b;

}

/* เส้นแดง */

.menu a::after{

content:"";
position:absolute;

left:0;
bottom:-6px;

width:0%;
height:2px;

background:#ff2b2b;

transition:.3s;

}

.menu a:hover::after{

width:100%;

}

/* ปุ่มขวา */

.right{

display:flex;
gap:10px;

}

.btn-outline{

padding:6px 14px;

border:1px solid #444;

background:transparent;

color:#aaa;

border-radius:8px;

cursor:pointer;

}

.btn-outline:hover{

border-color:#ff2b2b;
color:white;

}

/* ปุ่มแดง */

.btn-red{

padding:6px 16px;

border:none;

border-radius:8px;

background:linear-gradient(45deg,#ff0000,#b00000);

color:white;

font-weight:600;

cursor:pointer;

box-shadow:0 0 10px rgba(255,0,0,.4);

}

</style>

</head>


<body>

<nav class="navbar">

<div class="logo">
KITTISAK BUNSUAY
</div>

<ul class="menu">

<li><a href="index.html">Home</a></li>
<li><a href="Resume.html">Profile</a></li>
<li><a href="educational record1.html">Education</a></li>
<li><a href="performance.html">Certificates</a></li>
<li><a href="activity1.html">Activities</a></li>

</ul>

<div class="right">

<button class="btn-outline">ผู้จัดทำ</button>
<button class="btn-red">KITTISAK</button>

</div>

</nav>

</body>
</html>
