<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KITTISAK Portfolio</title>

<style>

/* รีเซ็ตพื้นฐาน */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI, sans-serif;
}

body{
background:#080808;
color:white;
overflow-x:hidden;
}

/* ===== NAVBAR ===== */
.navbar{
position:fixed;
top:25px;
left:50%;
transform:translateX(-50%);
width:60%;
display:flex;
justify-content:space-between;
align-items:center;
padding:14px 35px;
background:rgba(10,10,10,0.55);
backdrop-filter:blur(12px);
-webkit-backdrop-filter:blur(12px);
border-radius:14px;
border:1px solid rgba(255,0,0,0.2);
box-shadow:
0 10px 40px rgba(0,0,0,.9),
0 0 20px rgba(120,0,0,.2);
z-index:9999;
}

.logo{
font-size:16px;
font-weight:600;
letter-spacing:2px;
color:#ffffff;
}

.menu{
display:flex;
gap:40px;
list-style:none;
}

.menu a{
text-decoration:none;
color:#9a9a9a;
font-size:14px;
position:relative;
transition:.3s;
}

.menu a:hover{
color:#ff2b2b;
}

.menu a::after{
content:"";
position:absolute;
left:0;
bottom:-6px;
width:0%;
height:2px;
background:#ff2b2b;
transition:.3s;
}

.menu a:hover::after{
width:100%;
}

.right{
display:flex;
gap:10px;
}

.btn-outline{
padding:6px 14px;
border:1px solid #444;
background:transparent;
color:#aaa;
border-radius:8px;
cursor:pointer;
transition:.3s;
}

.btn-outline:hover{
border-color:#ff2b2b;
color:white;
}

.btn-red{
padding:6px 16px;
border:none;
border-radius:8px;
background:linear-gradient(45deg,#ff0000,#b00000);
color:white;
font-weight:600;
cursor:pointer;
box-shadow:0 0 10px rgba(255,0,0,.4);
}

/* VIDEO BACKGROUND */
.bg-video{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:120%;
height:120%;
object-fit:cover;
opacity:.25;
filter:blur(6px);
z-index:0;
pointer-events:none;
}

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
position:relative;
overflow:hidden;
}

/* RED GLOW */
.hero::before{
content:"";
position:absolute;
width:1200px;
height:1200px;
background:radial-gradient(circle,rgba(255,0,0,.40),transparent 70%);
filter:blur(160px);
animation:floatGlow 10s infinite ease-in-out;
z-index:1;
}

@keyframes floatGlow{
0%{transform:translate(-100px,-80px) scale(1);}
50%{transform:translate(120px,60px) scale(1.2);}
100%{transform:translate(-100px,-80px) scale(1);}
}

.hero h1{
font-size:90px;
color:#ff1a1a;
text-shadow:0 0 50px rgba(255,0,0,.8);
z-index:2;
letter-spacing:6px;
}

.buttons{
display:flex;
gap:24px;
margin-top:40px;
z-index:2;
}

.btn{
width:180px;
height:50px;
display:flex;
align-items:center;
justify-content:center;
border-radius:40px;
text-decoration:none;
font-weight:600;
transition:.35s;
}

.btn-main{
background:linear-gradient(45deg,#ff0000,#7a0000);
color:white;
box-shadow:0 0 20px rgba(255,0,0,.7);
}

.btn:hover{
transform:translateY(-4px) scale(1.05);
box-shadow:0 10px 35px rgba(255,0,0,.6);
}

.menu-box{
position:relative;
}

.dropdown{
position:absolute;
bottom:65px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:12px;
opacity:0;
pointer-events:none;
transition:.3s;
}

.dropdown.show{
opacity:1;
pointer-events:auto;
}

.dropdown a{
background:#ff0000;
padding:10px 18px;
border-radius:10px;
color:white;
text-decoration:none;
}

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100vh;
background:rgba(0,0,0,.6);
backdrop-filter:blur(20px);
display:flex;
align-items:center;
justify-content:center;
opacity:0;
pointer-events:none;
transition:.4s;
z-index:999;
}

.overlay.show{
opacity:1;
pointer-events:auto;
}

.card{
width:90%;
max-width:1300px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(40px);
border-radius:30px;
border:1px solid rgba(255,255,255,0.15);
padding:50px;
display:flex;
gap:60px;
}

.features{
width:420px;
}

.feature{
margin-bottom:12px;
transition:.4s;
}

.feature-btn{
width:100%;
background:rgba(255,255,255,0.08);
border:none;
padding:16px 20px;
border-radius:30px;
font-size:16px;
display:flex;
align-items:center;
cursor:pointer;
color:white;
}

.feature:not(.active) .feature-btn{
opacity:.6;
transform:scale(.92);
}

.feature.active .feature-btn{
background:rgba(255,255,255,.18);
transform:scale(1);
}

.plus{
width:26px;
height:26px;
border-radius:50%;
border:1px solid #fff;
display:flex;
align-items:center;
justify-content:center;
margin-right:10px;
}

.viewer{
flex:1;
display:flex;
flex-direction:column;
}

.viewer img{
width:100%;
border-radius:20px;
box-shadow:0 30px 80px rgba(0,0,0,.8);
transition:opacity .5s ease, transform .5s ease;
}

.viewer img.fade{
opacity:0;
transform:scale(.95);
}

.description{
margin-top:25px;
padding:25px;
background:rgba(255,255,255,0.08);
border-radius:15px;
line-height:1.7;
max-height:220px;
overflow-y:auto;
font-size:15px;
}

.close{
position:absolute;
top:40px;
right:50px;
font-size:28px;
cursor:pointer;
}

</style>
</head>

<body>

<!-- ===== NAVBAR ===== -->
<nav class="navbar">
  <div class="logo">KITTISAK BUNSUAY</div>
  <ul class="menu">
    <li><a href="index.html">Home</a></li>
    <li><a href="Resume.html">Profile</a></li>
    <li><a href="educational record1.html">Educational</a></li>
    <li><a href="performance.html">Certificates</a></li>
    <li><a href="activity1.html">Activities</a></li>
  </ul>
  <div class="right">
    <button class="btn-outline">ผู้จัดทำ</button>
    <button class="btn-red">KITTISAK</button>
  </div>
</nav>

<div class="hero">

<video class="bg-video" autoplay muted loop playsinline>
<source src="aaedit.mp4" type="video/mp4">
</video>

<h1>KITTISAK</h1>

<div class="buttons">

<div class="menu-box">
<a href="#" class="btn btn-main" id="portfolioBtn">ดูผลงาน</a>
<div class="dropdown" id="dropdown">
<a href="#" id="openActivity">Certificates</a>
<a href="#" id="openCert">activity</a>
</div>
</div>

<a href="Resume.html" class="btn btn-outline">Resume</a>

</div>
</div>

<div class="overlay" id="overlay">
<div class="close" id="closeOverlay">✕</div>
<div class="card">
<div class="features" id="featureList"></div>
<div class="viewer">
<img id="mainImage">
<div class="description" id="mainText"></div>
</div>
</div>
</div>

<script>

const btn=document.getElementById("portfolioBtn")
const menu=document.getElementById("dropdown")

btn.onclick=(e)=>{
e.preventDefault()
menu.classList.toggle("show")
}

const overlay=document.getElementById("overlay")
const featureList=document.getElementById("featureList")
const img=document.getElementById("mainImage")
const text=document.getElementById("mainText")

document.getElementById("closeOverlay").onclick=()=>{
overlay.classList.remove("show")
}

const activities=[
{img:"A1.jpg",text:"เข้าค่ายวิทยาศาสตร์ เป็นกิจกรรมที่ฝึกการทดลองและการทำงานเป็นทีม"},
{img:"A2.jpg",text:"แข่งขันหุ่นยนต์ ได้เรียนรู้การเขียนโปรแกรมและการออกแบบระบบ"},
{img:"A3.jpg",text:"ทำโปรเจกต์เกี่ยวกับเทคโนโลยีและนวัตกรรม"},
{img:"images/sport.jpg",text:"เข้าร่วมการแข่งขันกีฬาของโรงเรียน"},
{img:"images/volunteer.jpg",text:"กิจกรรมจิตอาสาเพื่อช่วยเหลือชุมชน"}
]

const certs=[
{img:"B1.jpg",text:"เกียรติบัตรการแข่งขันหุ่นยนต์ระดับจังหวัด"},
{img:"B2.jpg",text:"เกียรติบัตรการแข่งขันคณิตศาสตร์"},
{img:"B3.jpg",text:"เกียรติบัตรค่ายวิทยาศาสตร์"}
]

function loadItems(data){
featureList.innerHTML=""
data.forEach((item,i)=>{
let div=document.createElement("div")
div.className="feature"
if(i==0) div.classList.add("active")
div.innerHTML=`<button class="feature-btn" data-img="${item.img}" data-text="${item.text}"><div class="plus">+</div>รายการ ${i+1}</button>`
featureList.appendChild(div)
})
setupButtons()
img.src=data[0].img
text.innerText=data[0].text
overlay.classList.add("show")
}

document.getElementById("openActivity").onclick=(e)=>{
e.preventDefault()
loadItems(activities)
}

document.getElementById("openCert").onclick=(e)=>{
e.preventDefault()
loadItems(certs)
}

function setupButtons(){
const features=document.querySelectorAll(".feature")
features.forEach(item=>{
const btn=item.querySelector(".feature-btn")
btn.onclick=()=>{
features.forEach(f=>f.classList.remove("active"))
item.classList.add("active")
img.classList.add("fade")
setTimeout(()=>{
img.src=btn.dataset.img
text.innerText=btn.dataset.text
img.classList.remove("fade")
},250)
}
})
}

</script>

</body>
</html>
